<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>测速 · sogetsu.online/speedtest</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #3d9cf5;
      --ok: #3ecf8e;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 1.25rem;
    }
    main {
      max-width: 40rem;
      margin: 0 auto;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
    p.lead { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.25rem; line-height: 1.5; }
    p.warn-banner {
      background: rgba(240, 113, 120, 0.12);
      border: 1px solid rgba(240, 113, 120, 0.35);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: #f5a8ad;
      margin: 0 0 1rem;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      line-height: 1.55;
    }
    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 0.35rem;
    }
    .card .host {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .card .card-actions {
      margin: 0.65rem 0 0.75rem;
    }
    .val { color: var(--ok); font-weight: 600; }
    .err { color: #f07178; }
    .pending { color: var(--muted); }
    .region-live {
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
      margin-top: 0.55rem;
      padding-top: 0.55rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      line-height: 1.5;
    }
    .region-live .live-val { color: var(--text); font-weight: 600; }
    .regions { margin-top: 0.5rem; }
  </style>
</head>
<body>
  <main>
    <h1>网络测速</h1>
    <p id="proto-warn" class="warn-banner" hidden></p>
    <p class="lead">
      请使用 <strong>http://sogetsu.online/speedtest</strong> 打开本页。每张卡片独立测一个节点，请求地址为
      <code>http://&lt;节点 IP&gt;/speedtest/download.bin</code>（HTTP）。
      请<strong>依次</strong>点击各卡「开始测速」，避免多路同时下载挤占本机下行；一次仅会跑一路测速（进行中时所有按钮暂时禁用）。
      各节点需已部署该路径，并对来源 <code>http://sogetsu.online</code> 配置 CORS（若需）。
    </p>

    <div class="regions" id="regions" aria-live="polite"></div>
  </main>
  <script>
    /** 与 SSH 配置对应；测速 URL：http://主机/speedtest/download.bin（HTTP，与页面一致） */
    const REMOTE_ENDPOINTS = [
      { id: "sg", name: "Singapore", host: "129.226.155.17" },
      { id: "tk", name: "Tokyo", host: "43.165.166.145" },
      { id: "hk", name: "Hongkong", host: "43.132.166.33" },
    ];

    function downloadUrl(host) {
      return "http://" + host + "/speedtest/download.bin";
    }

    function fmtMbps(bytes, seconds) {
      if (!seconds || seconds <= 0) return "—";
      const mbps = (bytes * 8) / seconds / 1e6;
      return mbps.toFixed(2) + " Mbps";
    }

    function fmtBytes(n) {
      if (n < 1024) return n + " B";
      if (n < 1048576) return (n / 1024).toFixed(1) + " KB";
      return (n / 1048576).toFixed(2) + " MB";
    }

    /**
     * @param {string} url
     * @param {(s: { bytes: number; elapsed: number; avgMbps: number; instMbps: number | null }) => void} [onProgress]
     */
    async function measureDownload(url, onProgress) {
      const t0 = performance.now();
      const res = await fetch(url, { cache: "no-store", mode: "cors" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const reader = res.body && res.body.getReader();
      if (!reader) throw new Error("无法读取响应体");
      let bytes = 0;
      let lastTick = t0;
      let lastBytes = 0;
      let lastPaint = t0;
      const paintIntervalMs = 120;

      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        bytes += value.byteLength;
        const now = performance.now();
        const elapsed = (now - t0) / 1000;
        const avgMbps = elapsed > 0 ? (bytes * 8) / elapsed / 1e6 : 0;
        const dt = (now - lastTick) / 1000;
        let instMbps = null;
        if (dt >= 0.15) {
          const db = bytes - lastBytes;
          if (dt > 0 && db > 0) instMbps = (db * 8) / dt / 1e6;
          lastTick = now;
          lastBytes = bytes;
        }
        if (onProgress && now - lastPaint >= paintIntervalMs) {
          lastPaint = now;
          onProgress({
            bytes,
            elapsed,
            avgMbps,
            instMbps,
          });
        }
      }
      const t1 = performance.now();
      const seconds = (t1 - t0) / 1000;
      if (onProgress) {
        onProgress({
          bytes,
          elapsed: seconds,
          avgMbps: seconds > 0 ? (bytes * 8) / seconds / 1e6 : 0,
          instMbps: null,
        });
      }
      return { bytes, seconds };
    }

    function buildRegionCards() {
      const root = document.getElementById("regions");
      root.innerHTML = REMOTE_ENDPOINTS.map(
        (ep) =>
          '<div class="card" id="card-' +
          ep.id +
          '">' +
          "<h2>" +
          ep.name +
          '<span class="host">' +
          ep.host +
          "</span></h2>" +
          '<div class="card-actions">' +
          '<button type="button" id="btn-' +
          ep.id +
          '" data-endpoint="' +
          ep.id +
          '">开始测速</button></div>' +
          '<div id="out-' +
          ep.id +
          '" class="pending">尚未测速</div>' +
          '<div id="live-' +
          ep.id +
          '" class="region-live" hidden></div></div>'
      ).join("");
    }

    function setAllRunButtonsDisabled(disabled) {
      REMOTE_ENDPOINTS.forEach((ep) => {
        const b = document.getElementById("btn-" + ep.id);
        if (b) b.disabled = disabled;
      });
    }

    function friendlyError(e) {
      const msg = e && e.message ? e.message : String(e);
      if (/Failed to fetch|NetworkError|Load failed/i.test(msg)) {
        let hint =
          "（若为跨域，请在各节点对来源 http://sogetsu.online 配置 Access-Control-Allow-Origin。）";
        if (location.protocol === "https:") {
          hint +=
            " 当前为 https 页面，向 http 测速地址可能被浏览器按混合内容拦截，请改用 http://sogetsu.online/speedtest 打开。";
        }
        return msg + hint;
      }
      return msg;
    }

    let runLock = false;

    async function runOne(ep) {
      const url = downloadUrl(ep.host);
      const out = document.getElementById("out-" + ep.id);
      const live = document.getElementById("live-" + ep.id);
      live.hidden = false;
      out.className = "pending";
      out.textContent = "正在连接并下载…";
      live.innerHTML =
        '<span class="live-val">0 B</span> · 已用 0.0s · 平均 — · 瞬时 —';

      try {
        const { bytes, seconds } = await measureDownload(url, (s) => {
          const inst =
            s.instMbps != null &&
            !Number.isNaN(s.instMbps) &&
            s.instMbps > 0
              ? s.instMbps.toFixed(2) + " Mbps"
              : "—";
          const avg =
            s.avgMbps != null && !Number.isNaN(s.avgMbps)
              ? s.avgMbps.toFixed(2) + " Mbps"
              : "—";
          live.innerHTML =
            '已下载 <span class="live-val">' +
            fmtBytes(s.bytes) +
            "</span>（" +
            s.bytes.toLocaleString() +
            " 字节）<br/>已用 <span class=\"live-val\">" +
            s.elapsed.toFixed(1) +
            " s</span> · 平均 <span class=\"live-val\">" +
            avg +
            "</span> · 瞬时 <span class=\"live-val\">" +
            inst +
            "</span>";
        });
        const mbps = fmtMbps(bytes, seconds);
        const mb = (bytes / 1e6).toFixed(2);
        out.className = "";
        out.innerHTML =
          '平均下行：<span class="val">' +
          mbps +
          "</span><br/>约 <span class=\"val\">" +
          mb +
          " MB</span>，用时 <span class=\"val\">" +
          seconds.toFixed(2) +
          " s</span>";
        live.innerHTML =
          '完成：共 <span class="live-val">' +
          fmtBytes(bytes) +
          "</span>（" +
          bytes.toLocaleString() +
          " 字节）";
      } catch (e) {
        out.className = "err";
        out.textContent = "失败：" + friendlyError(e);
        live.hidden = true;
        live.textContent = "";
      }
    }

    buildRegionCards();

    (function initProtoWarn() {
      const el = document.getElementById("proto-warn");
      if (location.protocol === "https:") {
        el.hidden = false;
        el.textContent =
          "当前通过 HTTPS 打开：浏览器可能阻止本页向 http:// 测速地址发起请求。请改用 http://sogetsu.online/speedtest 打开后再测速。";
      }
    })();

    REMOTE_ENDPOINTS.forEach((ep) => {
      document.getElementById("btn-" + ep.id).addEventListener("click", async () => {
        if (runLock) return;
        runLock = true;
        setAllRunButtonsDisabled(true);
        try {
          await runOne(ep);
        } finally {
          runLock = false;
          setAllRunButtonsDisabled(false);
        }
      });
    });
  </script>
</body>
</html>
